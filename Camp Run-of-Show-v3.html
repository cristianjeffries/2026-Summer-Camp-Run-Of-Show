  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

weekOf }}<\u002Fdiv>\n      <button sc-camel-on-click=\"{{ editToggle }}\" style=\"{{ editToggleStyle }}\">{{ editToggleLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"position:sticky;top:0;z-index:30;background:oklch(0.975 0.004 90);padding:16px 0 14px;margin-top:18px;border-bottom:1px solid oklch(0.9 0.004 255);\">\n    <nav style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n      <sc-for list=\"{{ tabs }}\" as=\"tab\" hint-placeholder-count=\"5\">\n        <button sc-camel-on-click=\"{{ tab.onClick }}\" style=\"{{ tab.style }}\" style-hover=\"{{ tab.hoverStyle }}\">\n          <span style=\"font-size:24px;\">{{ tab.emoji }}<\u002Fspan>\n          <span style=\"display:flex;flex-direction:column;align-items:flex-start;line-height:1.15;\">\n            <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:17px;\">{{ tab.day }}<\u002Fspan>\n            <span style=\"{{ tab.subStyle }}\">{{ tab.sub }}<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;background:oklch(0.97 0.035 250);border:1px dashed oklch(0.78 0.06 250);border-radius:12px;padding:12px 18px;flex-wrap:wrap;\">\n      <div style=\"font-size:14px;color:oklch(0.4 0.04 255);line-height:1.4;max-width:600px;\">✎ <strong>Edit mode.<\u002Fstrong> Click any resource to change its label, link, or type — or “+ Add link” to attach your own. Edits save on this device — to share them with other counselors, use <strong>Share / import links<\u002Fstrong>.<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <button sc-camel-on-click=\"{{ openShare }}\" style=\"display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;background:oklch(0.5 0.14 255);border:1.5px solid oklch(0.5 0.14 e:15px;line-height:1.45;color:oklch(0.32 0.01 255);\"><span style=\"{{ bulletStyle }}\"><\u002Fspan><span>{{ s }}<\u002Fspan><\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"{{ briefCardStyle }}\">\n        <div style=\"{{ briefHeadStyle }}\">🧰 Supplies &amp; prep<\u002Fdiv>\n        <sc-if value=\"{{ hasSupplies }}\" hint-placeholder-val=\"{{ true }}\">\n          <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px;\">\n            <sc-for list=\"{{ supplies }}\" as=\"sp\" hint-placeholder-count=\"1\">\n              <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:oklch(0.32 0.01 255);\"><span style=\"{{ bulletStyle }}\"><\u002Fspan><span>{{ sp.text }} <sc-if value=\"{{ sp.url }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ sp.url }}\" target=\"_blank\" rel=\"noopener\" style=\"color:oklch(0.5 0.13 255);font-weight:600;text-decoration:none;\">buy ↗<\u002Fa><\u002Fsc-if><\u002Fspan><\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noSupplies }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:15px;color:oklch(0.55 0.01 255);line-height:1.5;\">No special supplies — final showcase day.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"{{ backupCardStyle }}\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:oklch(0.55 0.01 255);margin-bottom:11px;\">⏱ Backup activity (extra time)<\u002Fdiv>\n        <div style=\"font-size:15px;line-height:1.5;color:oklch(0.34 0.01 255);\">{{ theme.backup }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:30px;\">\n      <sc-for list=\"{{ blocks }}\" as=\"b\" hint-placeholder-count=\"10\">\n        <section style=\"{{ b.sectionStyle }}\">\n          <div style=\"display:grid;grid-template-columns:128px 1fr;gap:30px;align-items:start;\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;\">\n              <div style=\"{{ b.badgeStyle }}\">{{ b.num }}<\u002Fdiv>\n              <div style=\"text-align:center;\">\n                <div style=\"{{ b.timeStyle }}\">{{ b.start }}<\u002Fdiv>\n                <div style=\"font-family:'DM Mono',monospace;font-size:13.5px;color:oklch(0.58 0.01 255);margin-top:2px;\">{{ b.end }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"{{ b.phaseStyle }}\">{{ b.phase }}<\u002Fdiv>\n              <div style=\"display:flex;gap:18px;flex-wrap:wrap;margin-top:16px;\">\n                <sc-for list=\"{{ b.cols }}\" as=\"c\" hint-placeholder-count=\"1\">\n                  <div style=\"{{ c.cardStyle }}\">\n                    <sc-if value=\"{{ c.label }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px;\">\n                        <span style=\"{{ c.labelStyle }}\">{{ c.label }}<\u002Fspan>\n                        <sc-if value=\"{{ c.sub }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:13px;color:oklch(0.52 0.01 255);font-style:italic;\">{{ c.sub }}<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <div style=\"{{ c.leadStyle }}\">{{ c.lead }}<\u002Fdiv>\n                    <sc-if value=\"{{ c.showResWrap }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:15px;\">\n                        <sc-for list=\"{{ c.resources }}\" as=\"r\" hint-placeholder-count=\"1\">\n                          <sc-if value=\"{{ r.showLink }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ r.url }}\" target=\"_blank\" rel=\"noopener\" style=\"{{ r.chipStyle }}\" style-hover=\"{{ r.chipHover }}\">{{ r.text }}<\u002Fa><\u002Fsc-if>\n                          <sc-if value=\"{{ r.showTag }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ r.chipStyle }}\">{{ r.text }}<\u002Fspan><\u002Fsc-if>\n                          <sc-if value=\"{{ r.showEdit }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ r.onEdit }}\" style=\"{{ r.editChipStyle }}\" style-hover=\"{{ r.editHover }}\">{{ r.editText }}<\u002Fbutton><\u002Fsc-if>\n                        <\u002Fsc-for>\n                        <sc-if value=\"{{ c.showAdd }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ c.onAdd }}\" style=\"{{ c.addStyle }}\">+ Add link<\u002Fbutton><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showPanel }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"margin-top:48px;padding-top:32px;border-top:1px solid oklch(0.9 0.004 255);\">\n      <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;margin:0 0 4px;\">Camp-wide resources<\u002Fh3>\n      <p style=\"margin:0 0 22px;font-size:15px;color:oklch(0.52 0.01 255);\">Available any day — down-time fillers, trivia, and the Showcase template.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;\">\n        <sc-for list=\"{{ resourceGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid oklch(0.91 0.004 255);border-radius:16px;padding:22px;\">\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px;\">{{ g.title }}<\u002Fdiv>\n            <sc-if value=\"{{ g.note }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:oklch(0.55 0.01 255);margin-bottom:13px;line-height:1.45;\">{{ g.note }}<\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ g.showWrap }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:8px;\">\n                <sc-for list=\"{{ g.items }}\" as=\"r\" hint-placeholder-count=\"2\">\n                  <sc-if value=\"{{ r.showLink }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ r.url }}\" target=\"_blank\" rel=\"noopener\" style=\"{{ r.chipStyle }}\" style-hover=\"{{ r.chipHover }}\">{{ r.text }}<\u002Fa><\u002Fsc-if>\n                  <sc-if value=\"{{ r.showTag }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ r.chipStyle }}\">{{ r.text }}<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ r.showEdit }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ r.onEdit }}\" style=\"{{ r.editChipStyle }}\" style-hover=\"{{ r.editHover }}\">{{ r.editText }}<\u002Fbutton><\u002Fsc-if>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ g.showAdd }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ g.onAdd }}\" style=\"{{ g.addStyle }}\">+ Add link<\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ hasEditTarget }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:100;background:rgba(20,22,28,0.45);display:flex;align-items:center;justify-content:center;padding:24px;animation:campfade .15s ease both;\" sc-camel-on-click=\"{{ closeEdit }}\">\n      <div style=\"background:#fff;border-radius:18px;padding:26px 26px 22px;width:440px;max-width:100%;box-shadow:0 30px 70px -20px rgba(0,0,0,0.5);\" sc-camel-on-click=\"{{ modalStop }}\">\n        <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin:0 0 18px;\">{{ modalTitle }}<\u002Fh3>\n        <label style=\"display:block;font-size:11.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(0.52 0.01 255);\">Label<\u002Flabel>\n        <input value=\"{{ et.label }}\" sc-camel-on-input=\"{{ onLabelInput }}\" placeholder=\"e.g. Intro to Soccer (Deck)\" style=\"{{ inputStyle }}\">\n        <label style=\"display:block;font-size:11.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(0.52 0.01 255);\">Link / URL<\u002Flabel>\n        <input value=\"{{ et.url }}\" sc-camel-on-input=\"{{ onUrlInput }}\" placeholder=\"https://…  (leave blank for a no-link reference)\" style=\"{{ inputStyle }}\">\n        <label style=\"display:block;font-size:11.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(0.52 0.01 255);margin-bottom:8px;\">Type<\u002Flabel>\n        <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;\">\n          <sc-for list=\"{{ typeBtns }}\" as=\"tb\" hint-placeholder-count=\"5\"><button sc-camel-on-click=\"{{ tb.onClick }}\" style=\"{{ tb.style }}\">{{ tb.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <sc-if value=\"{{ showRemove }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ removeEdit }}\" style=\"{{ removeBtnStyle }}\">Remove<\u002Fbutton><\u002Fsc-if>\n          <div style=\"display:flex;gap:10px;margin-left:auto;\">\n            <button sc-camel-on-click=\"{{ closeEdit }}\" style=\"{{ cancelBtnStyle }}\">Cancel<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ saveEdit }}\" style=\"{{ saveBtnStyle }}\">Save<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ shareOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:100;background:rgba(20,22,28,0.45);display:flex;align-items:center;justify-content:center;padding:24px;animation:campfade .15s ease both;\" sc-camel-on-click=\"{{ closeShare }}\">\n      <div style=\"background:#fff;border-radius:18px;padding:26px 26px 22px;width:540px;max-width:100%;box-shadow:0 30px 70px -20px rgba(0,0,0,0.5);\" sc-camel-on-click=\"{{ modalStopShare }}\">\n        <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin:0 0 6px;\">Share your link edits<\u002Fh3>\n        <p style=\"margin:0 0 20px;font-size:14px;line-height:1.5;color:oklch(0.5 0.01 255);\">Link edits live on each device. To get your changes onto another counselor's copy, send them this code — they paste it below.<\u002Fp>\n\n        <div style=\"font-size:11.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(0.52 0.01 255);margin-bottom:8px;\">1 · Your links code<\u002Fdiv>\n        <textarea readonly=\"\" value=\"{{ shareCode }}\" sc-camel-on-click=\"{{ selectAllOnClick }}\" style=\"width:100%;box-sizing:border-box;height:84px;padding:11px 13px;border:1.5px solid oklch(0.86 0.005 255);border-radius:10px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.4;color:oklch(0.3 0.01 255);background:oklch(0.98 0.003 90);resize:none;\"><\u002Ftextarea>\n        <button sc-camel-on-click=\"{{ copyCode }}\" style=\"margin-top:9px;padding:9px 16px;border-radius:10px;background:oklch(0.5 0.14 255);border:none;color:#fff;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;\">📋  Copy code<\u002Fbutton>\n\n        <div style=\"height:1px;background:oklch(0.91 0.004 255);margin:22px 0;\"><\u002Fdiv>\n\n        <div style=\"font-size:11.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(0.52 0.01 255);margin-bottom:8px;\">2 · Paste a code from someone else<\u002Fdiv>\n        <textarea value=\"{{ importText }}\" sc-camel-on-input=\"{{ onImportInput }}\" placeholder=\"Paste a CAMP1:… code here\" style=\"width:100%;box-sizing:border-box;height:84px;padding:11px 13px;border:1.5px solid oklch(0.86 0.005 255);border-radius:10px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.4;color:oklch(0.3 0.01 255);background:#fff;resize:none;\"><\u002Ftextarea>\n        <button sc-camel-on-click=\"{{ applyImport }}\" style=\"margin-top:9px;padding:9px 16px;border-radius:10px;background:#fff;border:1.5px solid oklch(0.5 0.14 255);color:oklch(0.5 0.14 255);font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;\">📥  Import these links<\u002Fbutton>\n\n        <sc-if value=\"{{ hasShareMsg }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px;font-size:13.5px;line-height:1.45;color:oklch(0.38 0.04 255);background:oklch(0.97 0.02 250);border:1px solid oklch(0.88 0.03 250);border-radius:10px;padding:11px 14px;\">{{ shareMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;margin-top:22px;\">\n          <button sc-camel-on-click=\"{{ closeShare }}\" style=\"margin-left:auto;padding:10px 20px;border-radius:11px;background:oklch(0.22 0.01 255);border:none;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:900},&quot;numberMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;index&quot;,&quot;options&quot;:[&quot;index&quot;,&quot;time&quot;],&quot;tsType&quot;:&quot;'index' | 'time'&quot;},&quot;showResourcePanel&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { day: 0, editing: false, overrides: {}, additions: {}, counter: 0, editTarget: null, shareOpen: false, importText: '', shareMsg: '' };\n\n  componentDidMount() {\n    try { const s = localStorage.getItem('camp-ros-day'); if (s !== null) this.setState({ day: +s }); } catch (e) {}\n    // Edits can come baked into the file (shared copy) and/or from this device. Merge with device taking priority.\n    let baked = {};\n    try { baked = (typeof window !== 'undefined' && window.__CAMP_BAKED_EDITS__) || {}; } catch (e) {}\n    let local = {};\n    try { const e = localStorage.getItem('camp-ros-edits'); if (e) local = JSON.parse(e) || {}; } catch (e) {}\n    const overrides = Object.assign({}, baked.overrides || {}, local.overrides || {});\n    const additions = Object.assign({}, baked.additions || {}, local.additions || {});\n    const counter = Math.max(baked.counter || 0, local.counter || 0);\n    this.setState({ overrides: overrides, additions: additions, counter: counter });\n  }\n\n  encodeEdits() {\n    const e = { overrides: this.state.overrides, additions: this.state.additions, counter: this.state.counter };\n    const json = JSON.stringify(e);\n    try { return 'CAMP1:' + btoa(unescape(encodeURIComponent(json))); } catch (_) { return 'CAMP1:' + btoa(json); }\n  }\n  decodeEdits(str) {\n    let s = (str || '').trim();\n    if (s.indexOf('CAMP1:') === 0) s = s.slice(6);\n    if (!s) return null;\n    const tries = [\n      () => JSON.parse(decodeURIComponent(escape(atob(s)))),\n      () => JSON.parse(atob(s)),\n      () => JSON.parse(s)\n    ];\n    for (let i = 0; i < tries.length; i++) { try { const v = tries[i](); if (v && typeof v === 'object') return v; } catch (_) {} }\n    return null;\n  }\n  openShare() { this.setState({ shareOpen: true, shareMsg: '', importText: '' }); }\n  closeShare() { this.setState({ shareOpen: false }); }\n  copyCode() {\n    const code = this.encodeEdits();\n    const done = () => this.setState({ shareMsg: '✅ Copied! Paste it into a message to your team.' });\n    try {\n      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(code).then(done, () => this.setState({ shareMsg: 'Select the code above and copy it manually (⌘/Ctrl + C).' })); return; }\n    } catch (_) {}\n    this.setState({ shareMsg: 'Select the code above and copy it manually (⌘/Ctrl + C).' });\n  }\n  applyImport() {\n    const parsed = this.decodeEdits(this.state.importText);\n    if (!parsed || typeof parsed !== 'object') { this.setState({ shareMsg: \"❌ That code didn't look right — copy the whole code and try again.\" }); return; }\n    const overrides = Object.assign({}, this.state.overrides, parsed.overrides || {});\n    const additions = Object.assign({}, this.state.additions, parsed.additions || {});\n    const counter = Math.max(this.state.counter || 0, parsed.counter || 0);\n    const n = Object.keys(parsed.overrides || {}).length + Object.keys(parsed.additions || {}).length;\n    this.setState({ overrides: overrides, additions: additions, counter: counter, importText: '', shareMsg: '✅ Imported ' + n + ' link change' + (n === 1 ? '' : 's') + ' — saved to this device.' }, () => this.persist());\n  }\n  pick(i) { this.setState({ day: i, editTarget: null }); try { localStorage.setItem('camp-ros-day', i); } catch (e) {} window.scrollTo({ top: 0 }); }\n  toggleEdit() { this.setState((s) => ({ editing: !s.editing, editTarget: null })); }\n  openEdit(t) { this.setState({ editTarget: Object.assign({ label: '', url: '', kind: 'link', isAdded: false, isNew: false }, t) }); }\n  closeEdit() { this.setState({ editTarget: null }); }\n  setField(f, v) { this.setState((s) => ({ editTarget: Object.assign({}, s.editTarget, { [f]: v }) })); }\n  persist() { try { localStorage.setItem('camp-ros-edits', JSON.stringify({ overrides: this.state.overrides, additions: this.state.additions, counter: this.state.counter })); } catch (e) {} }\n  saveEdit() {\n    const t = this.state.editTarget; if (!t) return;\n    const ov = Object.assign({}, this.state.overrides);\n    const ad = Object.assign({}, this.state.additions);\n    let counter = this.state.counter || 0;\n    const label = (t.label || '').trim();\n    c ups: this.resources().map((g, gi) => {\n        const cardId = 'p' + gi;\n        const items = this.cardResources(cardId, g.items, neutral);\n        return { title: g.title, note: g.note, items: items, showWrap: items.length > 0 || editing, showAdd: editing,\n          onAdd: () => this.openEdit({ id: null, cardId: cardId, label: '', url: '', kind: 'link', isAdded: true, isNew: true }), addStyle: addStyleFor(neutral) };\n      })\n    };\n\n    if (!isDay) return common;\n\n    const theme = days[day];\n    const t = { emoji: theme.emoji, day: theme.day, name: theme.name, dateLong: theme.dateLong, obj: theme.obj, eveningNote: theme.eveningNote || false, showcase: theme.showcase, backup: theme.backup };\n\n    const view = theme.blocks.map((b, idx) => {\n      const cols = b.cols.map((c, ci) => {\n        const cardId = 'd' + day + '.b' + idx + '.c' + ci;\n        const resources = this.cardResources(cardId, c.resources, theme);\n        const allowAdd = !b.muted;\n        const isAlt = c.label === 'ALTERNATIVE';\n        let cardStyle;\n        if (b.muted) cardStyle = 'flex:1;min-width:260px;background:oklch(0.975 0.003 255);border:1px solid oklch(0.92 0.004 255);border-radius:14px;padding:18px 22px;';\n        else if (isAlt) cardStyle = 'flex:1;min-width:300px;background:#fff;border:1.5px dashed ' + theme.line + ';border-radius:14px;padding:22px 24px;';\n        else cardStyle = 'flex:1;min-width:300px;background:' + theme.soft + ';border:1px solid ' + theme.line + ';border-left:5px solid ' + theme.main + ';border-radius:14px;padding:22px 24px;';\n        let labelStyle = '';\n        if (c.label) labelStyle = isAlt\n          ? 'display:inline-block;font-size:11px;letter-spacing:0.09em;font-weight:800;text-transform:uppercase;color:' + theme.main + ';border:1.5px solid ' + theme.line + ';padding:3px 9px;border-radius:6px;'\n          : 'display:inline-block;font-size:11px;letter-spacing:0.09em;font-weight:800;text-transform:uppercase;color:#fff;background:' + in-top:28px;background:' + theme.soft + ';border:1px solid ' + theme.line + ';border-left:10px solid ' + theme.main + ';border-radius:20px;padding:34px 38px;',\n      sportTagStyle: 'display:inline-block;white-space:nowrap;line-height:1.3;font-family:\\'Archivo\\',sans-serif;font-size:15px;font-weight:700;color:#fff;background:' + theme.main + ';padding:6px 16px;border-radius:999px;letter-spacing:0.01em;',\n      briefCardStyle: 'background:#fff;border:1px solid oklch(0.91 0.004 255);border-top:4px solid ' + theme.main + ';border-radius:16px;padding:22px;',\n      backupCardStyle: 'background:oklch(0.985 0.003 90);border:1.5px dashed ' + theme.line + ';border-radius:16px;padding:22px;',\n      briefHeadStyle: 'font-family:\\'Archivo\\',sans-serif;font-weight:700;font-size:15px;margin-bottom:15px;color:oklch(0.24 0.012 255);',\n      bulletStyle: 'flex:none;width:7px;height:7px;border-radius:50%;margin-top:7px;background:' + theme.main + ';',\n      supplies: supplies, hasSupplies: supplies.length > 0, noSupplies: supplies.length === 0\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
